aid: oci
name: OCI
description: >-
  OCI (Open Container Initiative) is an open governance structure for creating
  open industry standards around container formats and runtimes. OCI defines
  standards for container images, distribution, and runtime specifications
  used by Docker, Kubernetes, and other container technologies.
